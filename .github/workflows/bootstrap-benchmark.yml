name: Bootstrap + Benchmark Cycle

on:
  # Cycle 2480: run only when compiler/runtime/stdlib/bootstrap or the
  # benchmark suite itself changes. Doc-only and CI-yaml-only pushes
  # (which don't affect bootstrap or benchmark output) skip the 2-hour
  # run. Keep this workflow's own yaml in the allowlist so edits
  # self-verify.
  pull_request:
    branches: [main]
    paths:
      - 'bmb/**'
      - 'bootstrap/**'
      - 'stdlib/**'
      - 'scripts/bootstrap.sh'
      - 'scripts/benchmark.sh'
      - 'scripts/quick-check.sh'
      - 'scripts/full-cycle.sh'
      - 'scripts/compare.py'
      - 'ecosystem/benchmark-bmb/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/bootstrap-benchmark.yml'
  push:
    branches: [main]
    paths:
      - 'bmb/**'
      - 'bootstrap/**'
      - 'stdlib/**'
      - 'scripts/bootstrap.sh'
      - 'scripts/benchmark.sh'
      - 'scripts/quick-check.sh'
      - 'scripts/full-cycle.sh'
      - 'scripts/compare.py'
      - 'ecosystem/benchmark-bmb/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/bootstrap-benchmark.yml'
  # Manual trigger when path-filter misses an intended case.
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"

jobs:
  # ==========================================================================
  # Job 1: Basic Tests
  # ==========================================================================
  test:
    name: Build & Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      # Cycle 2496 (H tier E): PR ubuntu-only, main push 3-OS matrix.
      # See ci.yml for rationale.
      matrix:
        os: ${{ fromJSON(github.event_name == 'pull_request' && '["ubuntu-latest"]' || '["ubuntu-latest","windows-latest","macos-latest"]') }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      # Cycle 2488: Swatinem/rust-cache@v2 — see ci.yml for rationale.
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "bootstrap-benchmark"

      - name: Build (release)
        run: cargo build --release

      # Cycle 2495 (H tier F): cargo-nextest — see ci.yml for rationale.
      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Run tests
        run: cargo nextest run --release

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

  # ==========================================================================
  # Job 2: 3-Stage Bootstrap Verification
  # ==========================================================================
  bootstrap:
    name: 3-Stage Bootstrap
    runs-on: ubuntu-latest
    needs: test
    outputs:
      stage1_time: ${{ steps.bootstrap.outputs.stage1_time }}
      fixed_point: ${{ steps.bootstrap.outputs.fixed_point }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install LLVM 21
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 21
          sudo apt-get install -y libpolly-21-dev
          echo "LLVM_SYS_211_PREFIX=/usr/lib/llvm-21" >> $GITHUB_ENV
          echo "/usr/lib/llvm-21/bin" >> $GITHUB_PATH

      # Cycle 2488: Swatinem/rust-cache@v2 — see ci.yml for rationale.
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "bootstrap-benchmark-llvm"

      - name: Build BMB with LLVM
        run: cargo build --release --features llvm

      - name: Build BMB Runtime
        # Mirror scripts/bootstrap.sh: archive bmb_runtime.o +
        # bmb_event_loop.o together. Locally bootstrap.sh already does
        # this; CI workflows lagged, so any consumer pulling in
        # event-loop symbols would fail at link time here. Parity fix.
        run: |
          cd bmb/runtime
          clang -c bmb_runtime.c -o bmb_runtime.o -O3
          clang -c bmb_event_loop.c -o bmb_event_loop.o -O3
          ar rcs libbmb_runtime.a bmb_runtime.o bmb_event_loop.o
          echo "BMB_RUNTIME_PATH=$(pwd)/libbmb_runtime.a" >> $GITHUB_ENV

      - name: Run 3-Stage Bootstrap
        id: bootstrap
        run: |
          chmod +x scripts/bootstrap.sh

          # Cycle 2505: do NOT mask bootstrap failures. Capture exit code so
          # we can still upload bootstrap_results.json for debugging, then
          # surface the failure as a real CI error.
          set +e
          ./scripts/bootstrap.sh --json > bootstrap_log.txt 2>&1
          BOOTSTRAP_EXIT=$?
          set -e

          # Cycle 2505 follow-up: bootstrap.sh's `--json` output stream is
          # polluted by subprocess stderr (the BMB compiler prints
          # "Warning: Z3 solver not available", "Note: Fast compile mode",
          # `{"type":"build_success",...}` lines, etc.) because internal
          # invocations use `2>&1`. The file therefore is NOT valid JSON
          # as-a-whole. Extract the final multi-line bootstrap object
          # (the only block that begins with a single `{` on its own line
          # and ends with a single `}` on its own line) before parsing.
          awk '/^\{$/,/^\}$/' bootstrap_log.txt > bootstrap_results.json

          # Parse results (best-effort even on failure)
          if [ -s bootstrap_results.json ]; then
            STAGE1_TIME=$(python3 -c "import json; print(json.load(open('bootstrap_results.json'))['bootstrap']['stage1']['time_ms'])" 2>/dev/null || echo "0")
            FIXED_POINT=$(python3 -c "import json; print(json.load(open('bootstrap_results.json'))['bootstrap']['fixed_point'])" 2>/dev/null || echo "false")

            echo "stage1_time=$STAGE1_TIME" >> $GITHUB_OUTPUT
            echo "fixed_point=$FIXED_POINT" >> $GITHUB_OUTPUT

            echo "--- bootstrap_results.json (extracted) ---"
            cat bootstrap_results.json
          else
            echo "::warning::bootstrap_results.json empty after extraction — full log follows"
            echo "fixed_point=false" >> $GITHUB_OUTPUT
          fi

          echo "--- bootstrap_log.txt (full, last 200 lines) ---"
          tail -200 bootstrap_log.txt || true

          # Cycle 2505: prior to this, `|| true` swallowed bootstrap.sh's
          # exit 1, which itself is the only signal that fixed point was
          # reached. The result was 1+ year of green CI runs that had
          # actually failed bootstrap silently. Fail the step honestly so
          # the workflow status reflects reality.
          if [ "$BOOTSTRAP_EXIT" -ne 0 ]; then
            echo "::error::3-Stage Bootstrap failed (exit $BOOTSTRAP_EXIT) — see bootstrap_log.txt / bootstrap_results.json artifact"
            exit "$BOOTSTRAP_EXIT"
          fi

      - name: Verify Bootstrap Success
        run: |
          if [ "${{ steps.bootstrap.outputs.fixed_point }}" != "true" ] && [ "${{ steps.bootstrap.outputs.fixed_point }}" != "True" ]; then
            # Defensive: bootstrap.sh already exits 1 when fixed point is
            # not reached, so the previous step would have failed. This is
            # belt-and-suspenders for any future divergence between the
            # JSON `fixed_point` field and the script's exit code.
            echo "::error::Bootstrap fixed point not reached - Stage 2 and Stage 3 differ (output was '${{ steps.bootstrap.outputs.fixed_point }}')"
            exit 1
          fi
          echo "::notice::Bootstrap verified - fixed point reached"

      # Cycle 2720: PR-gated golden regression net.
      # Runs after Fixed Point check, reuses target/bootstrap/bmb-stage1
      # which was just built. --limit 50 bounds runtime to <1min.
      # Full 2862-test suite runs in nightly-bench.yml (deferred follow-up).
      - name: Run Golden Sample 50
        run: |
          chmod +x scripts/run-golden-tests.sh
          ./scripts/run-golden-tests.sh --limit 50 --json > golden_sample_50.json 2>&1 || \
            { echo "::error::Golden sample 50 failed"; tail -40 golden_sample_50.json; exit 1; }
          tail -5 golden_sample_50.json

      - name: Upload Bootstrap Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bootstrap-results
          path: |
            bootstrap_results.json
            bootstrap_log.txt
            golden_sample_50.json
            target/bootstrap/

  # ==========================================================================
  # Job 3: Benchmark Suite
  # ==========================================================================
  benchmark:
    name: Benchmark Suite
    runs-on: ubuntu-latest
    needs: bootstrap
    outputs:
      tier1_passed: ${{ steps.compare.outputs.tier1_passed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install LLVM 21
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 21
          sudo apt-get install -y libpolly-21-dev
          echo "LLVM_SYS_211_PREFIX=/usr/lib/llvm-21" >> $GITHUB_ENV
          echo "/usr/lib/llvm-21/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc

      # Cycle 2488: Swatinem/rust-cache@v2 — see ci.yml for rationale.
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "bootstrap-benchmark-llvm"

      - name: Build BMB with LLVM
        run: cargo build --release --features llvm

      - name: Build BMB Runtime
        # Mirror scripts/bootstrap.sh: archive bmb_runtime.o +
        # bmb_event_loop.o together. Locally bootstrap.sh already does
        # this; CI workflows lagged, so any consumer pulling in
        # event-loop symbols would fail at link time here. Parity fix.
        run: |
          cd bmb/runtime
          clang -c bmb_runtime.c -o bmb_runtime.o -O3
          clang -c bmb_event_loop.c -o bmb_event_loop.o -O3
          ar rcs libbmb_runtime.a bmb_runtime.o bmb_event_loop.o
          echo "BMB_RUNTIME_PATH=$(pwd)/libbmb_runtime.a" >> $GITHUB_ENV

      - name: Run Current Benchmarks
        run: |
          chmod +x scripts/benchmark.sh
          ./scripts/benchmark.sh --tier all --runs 5 --output current_benchmarks.json

      - name: Get Baseline (main branch)
        if: github.event_name == 'pull_request'
        run: |
          # Check if baseline exists in main branch
          git fetch origin main
          if git show origin/main:.baseline.json > baseline_benchmarks.json 2>/dev/null; then
            echo "Using baseline from main branch"
          else
            echo "No baseline found in main branch, using current as baseline"
            cp current_benchmarks.json baseline_benchmarks.json
          fi

      - name: Compare Results
        id: compare
        if: github.event_name == 'pull_request'
        run: |
          python3 scripts/compare.py \
            baseline_benchmarks.json \
            current_benchmarks.json \
            --tier1-threshold 2 \
            --threshold 5 \
            --ci \
            --output comparison_report.txt

          if [ $? -eq 0 ]; then
            echo "tier1_passed=true" >> $GITHUB_OUTPUT
          else
            echo "tier1_passed=false" >> $GITHUB_OUTPUT
          fi

          cat comparison_report.txt

      - name: Update Baseline (main branch push)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          echo "::notice::Benchmark results saved as new baseline"
          cp current_benchmarks.json .baseline.json

      - name: Upload Benchmark Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: |
            current_benchmarks.json
            baseline_benchmarks.json
            comparison_report.txt

  # ==========================================================================
  # Job 4: Performance Gate Check
  # ==========================================================================
  performance-gate:
    name: Performance Gate (2% threshold)
    runs-on: ubuntu-latest
    needs: [bootstrap, benchmark]
    if: github.event_name == 'pull_request'
    steps:
      - name: Check Performance Gate
        run: |
          echo "=== Performance Gate Check ==="
          echo ""
          echo "| Gate | Status |"
          echo "|------|--------|"
          echo "| Bootstrap Fixed Point | ${{ needs.bootstrap.outputs.fixed_point }} |"
          echo "| Tier 1 Regression (<2%) | ${{ needs.benchmark.outputs.tier1_passed }} |"
          echo ""

          # Tier 1 is blocking
          if [ "${{ needs.benchmark.outputs.tier1_passed }}" == "false" ]; then
            echo "::error::Performance gate failed: Tier 1 regression exceeds 2% threshold"
            exit 1
          fi

          echo "::notice::Performance gate passed"

  # ==========================================================================
  # Job 5: Summary
  # ==========================================================================
  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [test, bootstrap, benchmark]
    if: always()
    steps:
      - name: Generate Summary
        run: |
          echo "# BMB CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Build & Test | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 3-Stage Bootstrap + Golden 50 | ${{ needs.bootstrap.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Fixed Point | ${{ needs.bootstrap.outputs.fixed_point }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Benchmark Suite | ${{ needs.benchmark.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Performance Metrics" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Stage 1 compile time: ${{ needs.bootstrap.outputs.stage1_time }}ms" >> $GITHUB_STEP_SUMMARY
