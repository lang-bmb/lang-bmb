name: Update Benchmark Baseline

on:
  push:
    branches: [main]
    paths:
      # Cycle 2480: narrow from 'bmb/src/**' to only perf-affecting
      # modules. Parser / LSP / test harness changes don't shift
      # benchmark numbers and don't need a fresh baseline.
      # Cycle 2485 audit: cir/pir feed verified facts into MIR, derive
      # generates code, preprocessor expands macros — all perf-affecting.
      # Cargo manifests touch dep versions which can shift baselines.
      - 'bmb/src/codegen/**'
      - 'bmb/src/mir/**'
      - 'bmb/src/build/**'
      - 'bmb/src/cir/**'
      - 'bmb/src/pir/**'
      - 'bmb/src/derive/**'
      - 'bmb/src/preprocessor/**'
      - 'bmb/runtime/**'
      - 'stdlib/**'
      - 'ecosystem/benchmark-bmb/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'bmb/Cargo.toml'
      - '.github/workflows/benchmark-baseline.yml'
  workflow_dispatch:

# Cycle 2480: baseline updates are idempotent per commit; safe to cancel
# a queued older run when a newer commit lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  update-baseline:
    name: Update Benchmark Baseline
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install LLVM 21
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 21
          sudo apt-get install -y libpolly-21-dev
          echo "LLVM_SYS_211_PREFIX=/usr/lib/llvm-21" >> $GITHUB_ENV
          echo "/usr/lib/llvm-21/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: sudo apt-get install -y bc

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ubuntu-cargo-llvm-${{ hashFiles('**/Cargo.lock') }}

      - name: Build BMB with LLVM
        run: cargo build --release --features llvm

      - name: Build BMB Runtime
        # See bootstrap-benchmark.yml for rationale (event_loop parity).
        run: |
          cd bmb/runtime
          clang -c bmb_runtime.c -o bmb_runtime.o -O3
          clang -c bmb_event_loop.c -o bmb_event_loop.o -O3
          ar rcs libbmb_runtime.a bmb_runtime.o bmb_event_loop.o
          echo "BMB_RUNTIME_PATH=$(pwd)/libbmb_runtime.a" >> $GITHUB_ENV

      - name: Run Benchmarks
        run: |
          chmod +x scripts/benchmark.sh
          ./scripts/benchmark.sh --tier all --runs 10 --output .baseline.json

      - name: Create Baseline Artifact
        uses: actions/upload-artifact@v4
        with:
          name: baseline-${{ github.sha }}
          path: .baseline.json
          retention-days: 90

      - name: Store Baseline in Cache
        uses: actions/cache/save@v4
        with:
          path: .baseline.json
          key: baseline-${{ github.sha }}

      - name: Summary
        run: |
          echo "# Benchmark Baseline Updated" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Benchmark Results" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`json" >> $GITHUB_STEP_SUMMARY
          cat .baseline.json >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
