name: Bindings CI

on:
  push:
    branches: [main]
    paths:
      - 'ecosystem/bmb-*/**.py'
      - 'ecosystem/bmb-*/**.bmb'
      - 'ecosystem/build_all.py'
      - 'ecosystem/test_*.py'
      - '.github/workflows/bindings-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'ecosystem/bmb-*/**.py'
      - 'ecosystem/bmb-*/**.bmb'
      - 'ecosystem/build_all.py'
      - 'ecosystem/test_*.py'

jobs:
  test-bindings:
    name: Test Bindings (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-gnu
            llvm_setup: mingw
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            llvm_setup: apt
          - os: macos-latest
            target: x86_64-apple-darwin
            llvm_setup: brew
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Rust
        uses: dtolnay/rust-action@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install pytest setuptools wheel

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-bindings-${{ hashFiles('**/Cargo.lock') }}

      # --- Platform-specific LLVM/toolchain setup ---

      - name: Setup MinGW + LLVM (Windows)
        if: matrix.llvm_setup == 'mingw'
        uses: egor-tensin/setup-mingw@v2
        with:
          platform: x64

      - name: Setup LLVM (Ubuntu)
        if: matrix.llvm_setup == 'apt'
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add -
          sudo add-apt-repository "deb http://apt.llvm.org/$(lsb_release -cs)/ llvm-toolchain-$(lsb_release -cs)-21 main" || true
          sudo apt-get update
          sudo apt-get install -y llvm-21 llvm-21-dev lld-21 || sudo apt-get install -y llvm llvm-dev lld
          echo "/usr/lib/llvm-21/bin" >> $GITHUB_PATH

      - name: Setup LLVM (macOS)
        if: matrix.llvm_setup == 'brew'
        run: |
          brew install llvm
          echo "$(brew --prefix llvm)/bin" >> $GITHUB_PATH
          echo "LLVM_SYS_211_PREFIX=$(brew --prefix llvm)" >> $GITHUB_ENV

      # --- Build & Test ---

      - name: Build BMB compiler
        run: cargo build --release --features llvm --target ${{ matrix.target }}

      - name: Set BMB_RUNTIME_PATH
        run: echo "BMB_RUNTIME_PATH=${{ github.workspace }}/bmb/runtime" >> $GITHUB_ENV
        shell: bash

      - name: Build all binding libraries
        run: python ecosystem/build_all.py

      - name: Run per-library pytest suites
        run: python ecosystem/build_all.py --test

      - name: Run monolithic test suite
        run: python ecosystem/test_all_bindings.py

      - name: Run edge case tests
        run: python ecosystem/test_edge_cases.py

      - name: Run benchmarks (smoke test)
        run: python ecosystem/bmb-algo/benchmarks/bench_algo.py

      # --- Wheel build verification ---

      - name: Build wheels (smoke test)
        run: |
          cd ecosystem/bmb-algo && pip wheel . --no-deps -w dist/
          ls -la dist/
