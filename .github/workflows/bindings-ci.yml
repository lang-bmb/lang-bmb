name: Bindings CI

on:
  push:
    branches: [main]
    paths:
      - 'ecosystem/bmb-*/**.py'
      - 'ecosystem/bmb-*/**.bmb'
      - 'ecosystem/bmb-*/pyproject.toml'
      - 'ecosystem/bmb-*/MANIFEST.in'
      - 'ecosystem/build_all.py'
      - 'ecosystem/test_*.py'
      - 'scripts/build-wheel.sh'
      - '.github/workflows/bindings-ci.yml'
      # Cycle 2484: bindings build by invoking the BMB compiler on .bmb
      # sources, then linking against the runtime archive. Compiler-side
      # codegen/build/runtime/stdlib changes therefore can break bindings
      # without touching ecosystem/. Without these entries, B'.1-style
      # codegen fixes never trigger Bindings CI for empirical verification.
      - 'bmb/src/codegen/**'
      - 'bmb/src/build/**'
      - 'bmb/runtime/**'
      - 'stdlib/**'
  pull_request:
    branches: [main]
    paths:
      - 'ecosystem/bmb-*/**.py'
      - 'ecosystem/bmb-*/**.bmb'
      - 'ecosystem/bmb-*/pyproject.toml'
      - 'ecosystem/bmb-*/MANIFEST.in'
      - 'ecosystem/build_all.py'
      - 'ecosystem/test_*.py'
      - 'scripts/build-wheel.sh'
      - 'bmb/src/codegen/**'
      - 'bmb/src/build/**'
      - 'bmb/runtime/**'
      - 'stdlib/**'
  # Allow manual trigger — useful when path filter doesn't match (e.g.
  # submodule pointer changes, compiler-side fixes that affect bindings).
  workflow_dispatch:

# Cycle 2480: during CI work we often dispatch + push on the same HEAD,
# creating duplicate runs. Cancel the older one so we only burn runner
# minutes on the newest.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-bindings:
    name: Test Bindings (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            # Cycle 2478: MSVC Rust target matches MSVC-built LLVM 21
            # from KyleMayes action.
            # Cycle 2479: Use the text codegen backend (no `--features llvm`)
            # because the official LLVM Windows installer is runtime-only
            # — it ships clang/opt/llc but not the static libs llvm-sys
            # needs. The text backend produces LLVM IR strings and shells
            # out to clang for codegen, so it requires only the runtime
            # tools we already install via KyleMayes.
            target: x86_64-pc-windows-msvc
            llvm_setup: mingw
            cargo_features: ""
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            llvm_setup: apt
            # Cycle 3559 (D4b): text backend on Linux/macOS too (was --features llvm), so the
            # D4 DP-unroll fix (build/mod.rs text-backend clang compile) ships on these wheels;
            # the text path now emits -fPIC for non-Windows shared libs. apt/brew LLVM still
            # installed (clang/opt/llc on PATH). This is the PR-time verification gate for the
            # never-before-exercised text-backend Linux/macOS shared-lib path.
            cargo_features: ""
          # macos-13 = Intel native; macos-latest = Apple Silicon.
          - os: macos-13
            target: x86_64-apple-darwin
            llvm_setup: brew
            cargo_features: ""  # Cycle 3559 (D4b) — see ubuntu note above
          - os: macos-latest
            target: aarch64-apple-darwin
            llvm_setup: brew
            cargo_features: ""  # Cycle 3559 (D4b) — see ubuntu note above
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compile target for pinned toolchain
        # dtolnay/rust-toolchain@stable adds ${matrix.target}'s rust-std to
        # the `stable` toolchain, but rust-toolchain.toml pins us to 1.95.0.
        # When cargo runs inside the repo, the override activates 1.95.0
        # and the target rust-std is missing → E0463 "can't find crate
        # for `core`" on cross-compile (windows-latest: host=msvc,
        # target=gnu). Re-add the target under the active toolchain.
        shell: bash
        run: |
          rustup show active-toolchain
          rustup target add ${{ matrix.target }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install pytest setuptools wheel twine

      # Cycle 2488: Swatinem/rust-cache@v2 — see ci.yml for rationale.
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "bindings"

      # --- Platform-specific LLVM/toolchain setup ---

      - name: Setup MinGW (Windows)
        if: matrix.llvm_setup == 'mingw'
        uses: egor-tensin/setup-mingw@v2
        with:
          platform: x64
          # Disable action-side static-workaround. It tries to relocate
          # libpthread.dll.a (missing from current chocolatey MinGW pkg)
          # and fails. Our -static -static-libgcc linker flags (Cycle 2423
          # fix in bmb/src/build/mod.rs) already eliminate MinGW runtime
          # deps at link time, so the action workaround is redundant.
          static: 0

      - name: Setup LLVM (Windows)
        if: matrix.llvm_setup == 'mingw'
        # Cycle 2477: windows-latest's preinstalled LLVM is 22.1.2, but
        # llvm-sys-211 requires LLVM 21. Install LLVM 21 explicitly and
        # point LLVM_SYS_211_PREFIX at it. Parallels the Ubuntu/macOS
        # setup steps below.
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "21.1.8"
          directory: ${{ runner.temp }}/llvm21
      - name: Export LLVM_SYS_211_PREFIX (Windows)
        if: matrix.llvm_setup == 'mingw'
        shell: bash
        run: |
          echo "LLVM_SYS_211_PREFIX=${{ runner.temp }}/llvm21" >> $GITHUB_ENV
          echo "${{ runner.temp }}/llvm21/bin" >> $GITHUB_PATH

      - name: Setup LLVM (Ubuntu)
        if: matrix.llvm_setup == 'apt'
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add -
          sudo add-apt-repository "deb http://apt.llvm.org/$(lsb_release -cs)/ llvm-toolchain-$(lsb_release -cs)-21 main" || true
          sudo apt-get update
          sudo apt-get install -y llvm-21 llvm-21-dev lld-21 libpolly-21-dev || sudo apt-get install -y llvm llvm-dev lld libpolly-dev
          echo "/usr/lib/llvm-21/bin" >> $GITHUB_PATH
          echo "LLVM_SYS_211_PREFIX=/usr/lib/llvm-21" >> $GITHUB_ENV

      - name: Setup LLVM (macOS)
        if: matrix.llvm_setup == 'brew'
        run: |
          brew install llvm
          echo "$(brew --prefix llvm)/bin" >> $GITHUB_PATH
          echo "LLVM_SYS_211_PREFIX=$(brew --prefix llvm)" >> $GITHUB_ENV

      # --- Build & Test ---

      - name: Build BMB compiler
        # Cycle 2479: matrix.cargo_features differs per OS — Windows uses
        # the text codegen backend (no `--features llvm`) because the
        # MSVC LLVM 21 distribution lacks llvm-sys's static lib needs.
        run: cargo build --release ${{ matrix.cargo_features }} --target ${{ matrix.target }}

      - name: Build BMB Runtime (inkwell .a archive — inkwell backend only)
        # Inkwell backend's find_runtime() needs a -fPIC libbmb_runtime.a.
        # Cycle 3559: gated on the inkwell backend (cargo_features != ''). With all
        # platforms now on the text backend this step does not run; kept for any future
        # inkwell matrix entry.
        if: matrix.cargo_features != ''
        shell: bash
        run: |
          cd bmb/runtime
          clang -c bmb_runtime.c -o bmb_runtime.o -O3 -fPIC
          clang -c bmb_event_loop.c -o bmb_event_loop.o -O3 -fPIC
          ar rcs libbmb_runtime.a bmb_runtime.o bmb_event_loop.o
          echo "BMB_RUNTIME_PATH=$(pwd)/libbmb_runtime.a" >> $GITHUB_ENV

      - name: Set BMB_RUNTIME_PATH (text backend — all platforms)
        # Cycle 2479/3559: text backend's find_runtime_c() expects the .c source dir; it
        # shells out to clang to compile on demand. Cycle 3559: build/mod.rs now passes
        # -fPIC for non-Windows shared libs, so the TLS R_X86_64_TPOFF32 relocations that
        # previously forced the hand-built -fPIC archive are handled by the text backend
        # itself. Windows DLLs use a different relocation model (no PIC needed).
        if: matrix.cargo_features == ''
        shell: bash
        run: |
          echo "BMB_RUNTIME_PATH=${{ github.workspace }}/bmb/runtime" >> $GITHUB_ENV

      - name: Build all binding libraries
        run: python ecosystem/build_all.py

      - name: Verify Windows DLLs have no MinGW runtime deps (Cycle 2423 regression check)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          chmod +x scripts/verify-dll-deps.sh
          ./scripts/verify-dll-deps.sh

      - name: Run per-library pytest suites
        run: python ecosystem/build_all.py --test

      - name: Run monolithic test suite
        run: python ecosystem/test_all_bindings.py

      - name: Run edge case tests
        run: python ecosystem/test_edge_cases.py

      - name: Run benchmarks (smoke test)
        run: python ecosystem/bmb-algo/benchmarks/bench_algo.py

      # --- Wheel build verification ---

      - name: Build wheels for all 5 libraries (smoke test)
        shell: bash
        run: |
          chmod +x scripts/build-wheel.sh
          ./scripts/build-wheel.sh --skip-compiler --skip-libs

      - name: Verify no py3-none-any slipped through
        shell: bash
        run: |
          if ls dist/wheels/*-py3-none-any.whl >/dev/null 2>&1; then
            echo "::error::Pure-Python wheel detected — setup.py shim regressed."
            ls dist/wheels/*-py3-none-any.whl
            exit 1
          fi
          ls -la dist/wheels/

      - name: twine check metadata
        shell: bash
        run: twine check dist/wheels/*.whl
