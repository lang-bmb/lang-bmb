name: Bindings CI

on:
  push:
    branches: [main]
    paths:
      - 'ecosystem/bmb-*/**.py'
      - 'ecosystem/bmb-*/**.bmb'
      - 'ecosystem/bmb-*/pyproject.toml'
      - 'ecosystem/bmb-*/MANIFEST.in'
      - 'ecosystem/build_all.py'
      - 'ecosystem/test_*.py'
      - 'scripts/build-wheel.sh'
      - '.github/workflows/bindings-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'ecosystem/bmb-*/**.py'
      - 'ecosystem/bmb-*/**.bmb'
      - 'ecosystem/bmb-*/pyproject.toml'
      - 'ecosystem/bmb-*/MANIFEST.in'
      - 'ecosystem/build_all.py'
      - 'ecosystem/test_*.py'
      - 'scripts/build-wheel.sh'
  # Allow manual trigger — useful when path filter doesn't match (e.g.
  # submodule pointer changes, compiler-side fixes that affect bindings).
  workflow_dispatch:

jobs:
  test-bindings:
    name: Test Bindings (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-gnu
            llvm_setup: mingw
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            llvm_setup: apt
          # macos-13 = Intel native; macos-latest = Apple Silicon. Pinning
          # runner per arch avoids cross-compile with arch-specific brew LLVM
          # breaking --features llvm linking. Mirrors pypi-publish.yml layout.
          - os: macos-13
            target: x86_64-apple-darwin
            llvm_setup: brew
          - os: macos-latest
            target: aarch64-apple-darwin
            llvm_setup: brew
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compile target for pinned toolchain
        # dtolnay/rust-toolchain@stable adds ${matrix.target}'s rust-std to
        # the `stable` toolchain, but rust-toolchain.toml pins us to 1.95.0.
        # When cargo runs inside the repo, the override activates 1.95.0
        # and the target rust-std is missing → E0463 "can't find crate
        # for `core`" on cross-compile (windows-latest: host=msvc,
        # target=gnu). Re-add the target under the active toolchain.
        shell: bash
        run: |
          rustup show active-toolchain
          rustup target add ${{ matrix.target }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install pytest setuptools wheel twine

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-bindings-${{ hashFiles('**/Cargo.lock') }}

      # --- Platform-specific LLVM/toolchain setup ---

      - name: Setup MinGW + LLVM (Windows)
        if: matrix.llvm_setup == 'mingw'
        uses: egor-tensin/setup-mingw@v2
        with:
          platform: x64
          # Disable action-side static-workaround. It tries to relocate
          # libpthread.dll.a (missing from current chocolatey MinGW pkg)
          # and fails. Our -static -static-libgcc linker flags (Cycle 2423
          # fix in bmb/src/build/mod.rs) already eliminate MinGW runtime
          # deps at link time, so the action workaround is redundant.
          static: 0

      - name: Setup LLVM (Ubuntu)
        if: matrix.llvm_setup == 'apt'
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add -
          sudo add-apt-repository "deb http://apt.llvm.org/$(lsb_release -cs)/ llvm-toolchain-$(lsb_release -cs)-21 main" || true
          sudo apt-get update
          sudo apt-get install -y llvm-21 llvm-21-dev lld-21 libpolly-21-dev || sudo apt-get install -y llvm llvm-dev lld libpolly-dev
          echo "/usr/lib/llvm-21/bin" >> $GITHUB_PATH
          echo "LLVM_SYS_211_PREFIX=/usr/lib/llvm-21" >> $GITHUB_ENV

      - name: Setup LLVM (macOS)
        if: matrix.llvm_setup == 'brew'
        run: |
          brew install llvm
          echo "$(brew --prefix llvm)/bin" >> $GITHUB_PATH
          echo "LLVM_SYS_211_PREFIX=$(brew --prefix llvm)" >> $GITHUB_ENV

      # --- Build & Test ---

      - name: Build BMB compiler
        run: cargo build --release --features llvm --target ${{ matrix.target }}

      - name: Build BMB Runtime
        # Mirrors scripts/bootstrap.sh: archive bmb_runtime.o + bmb_event_loop.o
        # together so any binding library that references event-loop symbols
        # still links. Other workflows (bootstrap-benchmark, benchmark-*) only
        # archive bmb_runtime.o and would break the moment a consumer needs
        # event-loop support — parity is cheap insurance.
        #
        # Cycle 2476: `-fPIC` is required because binding libraries are built
        # with `bmb build --shared`; without PIC, TLS vars (g_ffi_has_error,
        # arena state, bmb_rng_state ...) yield R_X86_64_TPOFF32 relocations
        # that `ld -shared` rejects. `-fPIC` is safe for executable linkage
        # too, so no conditional is needed.
        shell: bash
        run: |
          cd bmb/runtime
          clang -c bmb_runtime.c -o bmb_runtime.o -O3 -fPIC
          clang -c bmb_event_loop.c -o bmb_event_loop.o -O3 -fPIC
          ar rcs libbmb_runtime.a bmb_runtime.o bmb_event_loop.o
          echo "BMB_RUNTIME_PATH=$(pwd)/libbmb_runtime.a" >> $GITHUB_ENV

      - name: Build all binding libraries
        run: python ecosystem/build_all.py

      - name: Verify Windows DLLs have no MinGW runtime deps (Cycle 2423 regression check)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          chmod +x scripts/verify-dll-deps.sh
          ./scripts/verify-dll-deps.sh

      - name: Run per-library pytest suites
        run: python ecosystem/build_all.py --test

      - name: Run monolithic test suite
        run: python ecosystem/test_all_bindings.py

      - name: Run edge case tests
        run: python ecosystem/test_edge_cases.py

      - name: Run benchmarks (smoke test)
        run: python ecosystem/bmb-algo/benchmarks/bench_algo.py

      # --- Wheel build verification ---

      - name: Build wheels for all 5 libraries (smoke test)
        shell: bash
        run: |
          chmod +x scripts/build-wheel.sh
          ./scripts/build-wheel.sh --skip-compiler --skip-libs

      - name: Verify no py3-none-any slipped through
        shell: bash
        run: |
          if ls dist/wheels/*-py3-none-any.whl >/dev/null 2>&1; then
            echo "::error::Pure-Python wheel detected — setup.py shim regressed."
            ls dist/wheels/*-py3-none-any.whl
            exit 1
          fi
          ls -la dist/wheels/

      - name: twine check metadata
        shell: bash
        run: twine check dist/wheels/*.whl
